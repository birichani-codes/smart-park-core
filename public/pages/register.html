<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Parking — Register</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-box">
    <h1>🚗 SmartPark</h1>
    <p class="subtitle">Create your account</p>

    <div id="alert" class="alert hidden"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="fullName" placeholder="John Kamau">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 characters">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="0712345678">
    </div>
    <div class="form-group">
      <label>Vehicle Registration (optional)</label>
      <input type="text" id="vehicleReg" placeholder="KAA 123A">
    </div>

    <button class="btn btn-primary btn-full" id="reg-btn" onclick="doRegister()">Create Account</button>

    <p class="text-muted mt-3" style="text-align:center">
      Have an account? <a href="/">Sign in</a>
    </p>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
  async function doRegister() {
    const body = {
      fullName:   document.getElementById('fullName').value.trim(),
      email:      document.getElementById('email').value.trim(),
      password:   document.getElementById('password').value,
      phone:      document.getElementById('phone').value.trim(),
      vehicleReg: document.getElementById('vehicleReg').value.trim(),
    };

    if (!body.fullName || !body.email || !body.password || !body.phone) {
      return showAlert('alert', 'Please fill in all required fields', 'error');
    }

    setLoading('reg-btn', true, 'Create Account');
    try {
      await api('/auth/register', { method: 'POST', body });
      showAlert('alert', 'Account created! Redirecting to login…', 'success');
      setTimeout(() => window.location.href = '/', 1500);
    } catch (err) {
      showAlert('alert', err.message, 'error');
    } finally {
      setLoading('reg-btn', false, 'Create Account');
    }
  }
</script>
</body>
</html>
