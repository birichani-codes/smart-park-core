<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Parking — Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-box">
    <h1>🚗 SmartPark</h1>
    <p class="subtitle">Sign in to manage your parking</p>

    <div id="alert" class="alert hidden"></div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">Sign In</button>

    <p class="text-muted mt-3" style="text-align:center">
      No account? <a href="/register">Register</a>
    </p>

    <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
      <p class="text-muted" style="font-size:.78rem;margin-bottom:8px">Test accounts (password: <code>password123</code>):</p>
      <p class="text-muted" style="font-size:.78rem">Admin: admin@smartpark.com</p>
      <p class="text-muted" style="font-size:.78rem">Attendant: attendant@smartpark.com</p>
      <p class="text-muted" style="font-size:.78rem">Driver: driver@smartpark.com</p>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
  // Redirect if already logged in
  if (getToken()) window.location.href = '/dashboard';

  async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) return showAlert('alert', 'Please fill in all fields', 'error');

    setLoading('login-btn', true, 'Sign In');
    try {
      const data = await api('/auth/login', { method: 'POST', body: { email, password } });
      setSession(data.data.token, data.data.user);
      window.location.href = '/dashboard';
    } catch (err) {
      showAlert('alert', err.message, 'error');
    } finally {
      setLoading('login-btn', false, 'Sign In');
    }
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
